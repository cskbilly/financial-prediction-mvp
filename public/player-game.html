<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲網 • 金融預測區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .ticket-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .ticket-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- 導航列 -->
    <nav class="bg-slate-900 border-b border-slate-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-6">
            <a href="#" class="font-bold text-xl">金融預測區</a>
            <a href="../admin/admin-dashboard.html" 
               class="text-sm px-3 py-1.5 hover:bg-slate-800 rounded-lg flex items-center gap-x-2 transition-colors">
                <i class="fa-solid fa-tachometer-alt"></i>
                <span>後台監控</span>
            </a>
        </div>
        <div class="flex items-center gap-x-4">
            <div class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-2xl flex items-center gap-x-2">
                <span class="text-sm text-slate-400">我的積分</span>
                <span class="text-xl font-bold text-emerald-400" id="user-points">12,500</span>
            </div>
            <button onclick="showTransferModal()" 
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium flex items-center gap-x-2 transition-colors">
                <i class="fa-solid fa-exchange-alt"></i>
                <span>轉入積分</span>
            </button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-8">
        
        <div class="mb-8">
            <h1 class="text-3xl font-bold">金融預測遊戲</h1>
            <p class="text-slate-400 mt-1">用積分挑戰真實市場 • 高賠率預測</p>
        </div>

        <!-- 票據列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="tickets-grid">
            <!-- 由 JavaScript 動態產生 -->
        </div>
    </div>

    <!-- 下注 Modal -->
    <div id="bet-modal" onclick="if (event.target.id === 'bet-modal') closeBetModal()"
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-md mx-4">
            
            <h3 class="text-xl font-bold mb-1" id="modal-ticket-name"></h3>
            <p class="text-sm text-slate-400 mb-5" id="modal-ticket-expires"></p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">下注金額（積分）</label>
                    <input type="number" id="bet-amount" value="1000" 
                           class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-2xl px-4 py-3 text-lg outline-none">
                </div>

                <div class="bg-slate-800 rounded-2xl p-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">預計可贏得</span>
                        <span class="text-2xl font-bold text-emerald-400" id="potential-win">0</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeBetModal()" 
                        class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl font-medium transition-colors">
                    取消
                </button>
                <button onclick="placeBet()" 
                        class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-medium transition-colors">
                    確認下注
                </button>
            </div>
        </div>
    </div>

    <script>
        let tickets = [
            {
                id: 1,
                name: "特斯拉 (TSLA) 今日收盤 > $420",
                odds: 4.2,
                expires: "今日 16:00",
                currentUnhedged: 385000
            },
            {
                id: 2,
                name: "COMEX 黃金 7/28 收盤 > $4200",
                odds: 5.8,
                expires: "7月28日",
                currentUnhedged: 186420
            },
            {
                id: 3,
                name: "輝達 (NVDA) 今日收盤 > $145",
                odds: 3.1,
                expires: "今日 16:00",
                currentUnhedged: 0
            }
        ];

        function renderTickets() {
            const container = document.getElementById('tickets-grid');
            container.innerHTML = '';

            tickets.forEach(ticket => {
                const card = document.createElement('div');
                card.className = `ticket-card bg-slate-900 border border-slate-700 rounded-3xl p-5 cursor-pointer`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="pr-4">
                            <div class="font-bold text-lg leading-tight">${ticket.name}</div>
                            <div class="text-sm text-slate-400 mt-2">${ticket.expires}</div>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <div class="text-3xl font-bold text-emerald-400">${ticket.odds}x</div>
                            <div class="text-xs text-slate-500 -mt-1">賠率</div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-xs text-slate-400">目前未對沖</div>
                            <div class="font-semibold">$${ticket.currentUnhedged.toLocaleString()}</div>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); openBetModal(${ticket.id})" 
                                class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-semibold transition-all">
                            立即下注
                        </button>
                    </div>
                `;

                card.onclick = () => openBetModal(ticket.id);
                container.appendChild(card);
            });
        }

        let currentTicket = null;

        function openBetModal(ticketId) {
            currentTicket = tickets.find(t => t.id === ticketId);
            if (!currentTicket) return;

            document.getElementById('modal-ticket-name').textContent = currentTicket.name;
            document.getElementById('modal-ticket-expires').textContent = currentTicket.expires;

            const amountInput = document.getElementById('bet-amount');
            amountInput.value = 1000;
            updatePotentialWin();
            amountInput.oninput = updatePotentialWin;

            document.getElementById('bet-modal').classList.remove('hidden');
            document.getElementById('bet-modal').classList.add('flex');
        }

        function updatePotentialWin() {
            const amount = parseInt(document.getElementById('bet-amount').value) || 0;
            const win = Math.floor(amount * currentTicket.odds);
            document.getElementById('potential-win').textContent = win.toLocaleString() + ' 積分';
        }

        function closeBetModal() {
            document.getElementById('bet-modal').classList.remove('flex');
            document.getElementById('bet-modal').classList.add('hidden');
        }

        function placeBet() {
            const amount = parseInt(document.getElementById('bet-amount').value);
            if (!amount || amount < 100) {
                alert('請輸入至少 100 積分');
                return;
            }

            const currentPoints = parseInt(document.getElementById('user-points').textContent.replace(/,/g, ''));
            if (amount > currentPoints) {
                alert('積分不足！');
                return;
            }

            // 呼叫後端 API
            fetch('https://redesigned-waddle-966vr5w6pr9v29p46-3000.app.github.dev/api/bet', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ticketId: currentTicket.id,
                    amount: amount
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('user-points').textContent = (currentPoints - amount).toLocaleString();
                    currentTicket.currentUnhedged = data.ticket.unhedged;
                    
                    closeBetModal();
                    renderTickets();
                    showToast(`下注成功！已扣除 ${amount} 積分`);
                } else {
                    alert('下注失敗，請稍後再試');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('無法連接到後端伺服器');
            });
        }

        function showTransferModal() {
            const amount = prompt('請輸入要轉入的積分金額：', '5000');
            if (!amount || isNaN(amount)) return;

            const current = parseInt(document.getElementById('user-points').textContent.replace(/,/g, ''));
            document.getElementById('user-points').textContent = (current + parseInt(amount)).toLocaleString();
            showToast(`成功轉入 ${amount} 積分`);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[200]';
            toast.innerHTML = `
                <i class="fa-solid fa-check-circle text-lg"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }

        function init() {
            renderTickets();
        }

        window.onload = init;
    </script>
</body>
</html>
