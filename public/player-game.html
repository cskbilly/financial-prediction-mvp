<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遊戲網 • 金融預測區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ticket-card { transition: transform 0.15s ease; }
        .ticket-card:active { transform: scale(0.98); }
        @media (hover:hover) { .ticket-card:hover { transform: translateY(-2px); } }
        .sheet-enter { animation: slideUp 0.25s ease-out; }
        @media (min-width: 768px) { .sheet-enter { animation: fadeScale 0.2s ease-out; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeScale { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        .quick-amt.active { background-color: #059669 !important; color: white; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 pb-20 md:pb-0">

    <div id="auth-screen" class="fixed inset-0 bg-slate-950 z-[300] flex items-center justify-center px-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-chart-line text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold">金融預測區</h1>
                <p class="text-slate-400 text-sm mt-1">登入或註冊開始遊戲</p>
            </div>

            <div class="space-y-3">
                <input type="text" id="auth-username" placeholder="帳號名稱" autocomplete="username"
                       class="w-full bg-slate-900 border border-slate-700 focus:border-emerald-500 rounded-2xl px-4 py-3.5 outline-none">
                <input type="password" id="auth-password" placeholder="密碼" autocomplete="current-password"
                       class="w-full bg-slate-900 border border-slate-700 focus:border-emerald-500 rounded-2xl px-4 py-3.5 outline-none">
            </div>

            <p id="auth-error" class="hidden text-red-400 text-sm mt-3 text-center"></p>

            <div class="space-y-3 mt-5">
                <button id="login-btn" onclick="handleLogin()" 
                        class="w-full py-3.5 bg-emerald-600 active:bg-emerald-500 hover:bg-emerald-500 rounded-2xl font-bold">
                    登入
                </button>
                <button id="register-btn" onclick="handleRegister()" 
                        class="w-full py-3.5 bg-slate-800 active:bg-slate-700 hover:bg-slate-700 rounded-2xl font-medium">
                    註冊新帳號（送 10,000 積分）
                </button>
            </div>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-slate-700 px-4 md:px-8 py-3 flex items-center justify-between sticky top-0 z-40 gap-2">
        <span class="font-bold text-base md:text-xl whitespace-nowrap flex-shrink-0">金融預測區</span>

        <div class="hidden md:flex items-center gap-x-4 flex-shrink-0">
            <a href="../admin/admin-dashboard.html" 
               class="text-sm px-3 py-1.5 hover:bg-slate-800 rounded-lg flex items-center gap-x-2 whitespace-nowrap">
                <i class="fa-solid fa-tachometer-alt"></i>
                <span>後台監控</span>
            </a>
            <div class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-2xl flex items-center gap-x-2 whitespace-nowrap">
                <span class="text-sm text-slate-400" id="username-display-desktop"></span>
                <span class="text-slate-600">|</span>
                <span class="text-sm text-slate-400">積分</span>
                <span class="text-xl font-bold text-emerald-400" id="user-points-desktop">0</span>
            </div>
            <button onclick="handleLogout()" 
                    class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-2xl text-sm font-medium flex items-center gap-x-2 whitespace-nowrap">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>登出</span>
            </button>
        </div>

        <button onclick="handleLogout()"
           class="md:hidden w-9 h-9 flex items-center justify-center bg-slate-800 rounded-full flex-shrink-0">
            <i class="fa-solid fa-right-from-bracket text-sm"></i>
        </button>
    </nav>

    <div class="px-4 md:px-8 pt-4 md:pt-8 pb-2 max-w-6xl mx-auto w-full">
        <h1 class="text-xl md:text-3xl font-bold">用積分挑戰真實市場</h1>
        <p class="text-slate-400 text-sm md:text-base mt-0.5">高賠率預測 · 即時對沖</p>
    </div>

    <div id="loading-state" class="text-center py-16 text-slate-400">
        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
        <p class="text-sm">載入票據中...</p>
    </div>

    <div id="empty-state" class="hidden text-center py-16 text-slate-400">
        <i class="fa-solid fa-inbox text-3xl mb-3"></i>
        <p class="text-sm">目前沒有任何票據</p>
    </div>

    <div class="px-4 md:px-8 pb-4 max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-5 hidden" id="tickets-grid">
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 px-4 py-3 flex items-center justify-between z-40 safe-bottom md:hidden">
        <div class="flex items-center gap-x-2 min-w-0">
            <i class="fa-solid fa-coins text-yellow-400 flex-shrink-0"></i>
            <span class="text-sm text-slate-400 whitespace-nowrap" id="username-display">玩家</span>
            <span class="text-lg font-bold text-emerald-400 whitespace-nowrap" id="user-points">0</span>
        </div>
        <span class="text-xs text-slate-500">即時積分</span>
    </div>

    <div id="bet-modal" onclick="if (event.target.id === 'bet-modal') closeBetModal()"
         class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end md:items-center justify-center">
        <div id="bet-sheet" onclick="event.stopImmediatePropagation()" 
             class="sheet-enter w-full md:max-w-md bg-slate-900 border-t md:border border-slate-700 rounded-t-3xl md:rounded-3xl p-5 md:p-6 pb-8 md:pb-6 safe-bottom max-h-[85vh] overflow-y-auto">
            
            <div class="w-10 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>

            <h3 class="text-lg font-bold mb-1" id="modal-ticket-name"></h3>
            <p class="text-sm text-slate-400 mb-1" id="modal-ticket-expires"></p>
            <p class="text-xs text-slate-500 mb-5" id="modal-ticket-pool"></p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">下注金額（積分）</label>
                    <input type="number" id="bet-amount" value="1000" inputmode="numeric"
                           class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-2xl px-4 py-4 text-2xl font-bold outline-none">
                    <div class="grid grid-cols-4 gap-2 mt-3" id="quick-amounts">
                        <button type="button" data-amt="500" class="quick-amt py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium">500</button>
                        <button type="button" data-amt="1000" class="quick-amt py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium">1000</button>
                        <button type="button" data-amt="5000" class="quick-amt py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium">5000</button>
                        <button type="button" onclick="setMaxAmount()" class="py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium">最大</button>
                    </div>
                </div>

                <div class="bg-slate-800 rounded-2xl p-4 flex justify-between items-center">
                    <span class="text-slate-400 text-sm">預計可贏得</span>
                    <span class="text-2xl font-bold text-emerald-400" id="potential-win">0</span>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeBetModal()" 
                        class="flex-1 py-4 bg-slate-700 active:bg-slate-600 hover:bg-slate-600 rounded-2xl font-medium">
                    取消
                </button>
                <button id="confirm-bet-btn" onclick="placeBet()" 
                        class="flex-[2] py-4 bg-emerald-600 active:bg-emerald-500 hover:bg-emerald-500 rounded-2xl font-bold text-lg">
                    確認下注
                </button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://hcwikvcdpnnssuibqvbd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd2lrdmNkcG5uc3N1aWJxdmJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDQyMjIsImV4cCI6MjEwMDAyMDIyMn0.apRzZ09BilPfafDEtdOFvbhde2QcxhF5zf0MxZ59du4';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let tickets = [];
        let currentTicket = null;
        let currentUser = null; // { user_id, username, points_balance }

        // ---------- 登入狀態管理 ----------
        function saveSession(user) {
            localStorage.setItem('fp_session', JSON.stringify(user));
            currentUser = user;
        }

        function loadSession() {
            const raw = localStorage.getItem('fp_session');
            if (!raw) return null;
            try { return JSON.parse(raw); } catch { return null; }
        }

        function clearSession() {
            localStorage.removeItem('fp_session');
            currentUser = null;
        }

        function showAuthError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideAuthError() {
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function handleLogin() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!username || !password) { showAuthError('請輸入帳號同密碼'); return; }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '登入中...';

            const { data, error } = await sb.rpc('login_user', { p_username: username, p_password: password });

            btn.disabled = false;
            btn.textContent = '登入';

            if (error || !data.success) {
                showAuthError(data ? data.message : '登入失敗，請稍後再試');
                return;
            }

            hideAuthError();
            saveSession({ user_id: data.user_id, username: data.username, points_balance: data.points_balance });
            enterGame();
        }

        async function handleRegister() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!username || !password) { showAuthError('請輸入帳號同密碼'); return; }
            if (password.length < 4) { showAuthError('密碼至少需要 4 個字元'); return; }

            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = '註冊中...';

            const { data, error } = await sb.rpc('register_user', { p_username: username, p_password: password });

            btn.disabled = false;
            btn.textContent = '註冊新帳號（送 10,000 積分）';

            if (error || !data.success) {
                showAuthError(data ? data.message : '註冊失敗，請稍後再試');
                return;
            }

            hideAuthError();
            saveSession({ user_id: data.user_id, username: username, points_balance: data.points_balance });
            enterGame();
        }

        function handleLogout() {
            if (!confirm('確定要登出嗎？')) return;
            clearSession();
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
        }

        function enterGame() {
            document.getElementById('auth-screen').classList.add('hidden');
            refreshUserDisplay();
            loadTickets();
        }

        function refreshUserDisplay() {
            if (!currentUser) return;
            const points = Number(currentUser.points_balance).toLocaleString();
            document.getElementById('user-points').textContent = points;
            document.getElementById('user-points-desktop').textContent = points;
            document.getElementById('username-display').textContent = currentUser.username;
            document.getElementById('username-display-desktop').textContent = currentUser.username;
        }

        // ---------- 票據載入邏輯（維持原有） ----------
        async function loadTickets() {
            const { data, error } = await sb.from('tickets').select('*').order('id', { ascending: true });
            if (error) {
                console.error('讀取失敗:', error);
                document.getElementById('loading-state').innerHTML = '<p class="text-red-400 text-sm">載入失敗，請檢查連線設定</p>';
                return;
            }
            tickets = data.map(mapTicket);
            document.getElementById('loading-state').classList.add('hidden');
            if (tickets.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('tickets-grid').classList.add('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('tickets-grid').classList.remove('hidden');
                renderTickets();
            }
        }

        function mapTicket(t) {
            return {
                id: t.id, name: t.name, odds: Number(t.odds), expires: formatExpiry(t.expires_at),
                currentUnhedged: Number(t.unhedged) || 0, currentPrice: t.current_price,
                direction: t.direction || 'bullish', maxLimit: Number(t.max_limit) || 500000,
                accumulatedBet: Number(t.accumulated_bet) || 0
            };
        }

        function formatExpiry(dateStr) {
            if (!dateStr) return '未設定';
            const d = new Date(dateStr);
            const now = new Date();
            const sameDay = d.toDateString() === now.toDateString();
            const timeStr = d.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
            if (sameDay) return `今日 ${timeStr}`;
            return `${d.getMonth() + 1}月${d.getDate()}日 ${timeStr}`;
        }

        sb.channel('tickets-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, (payload) => {
                if (payload.eventType === 'UPDATE') {
                    const updated = mapTicket(payload.new);
                    const index = tickets.findIndex(t => t.id === updated.id);
                    if (index !== -1) tickets[index] = updated;
                    renderTickets();
                } else if (payload.eventType === 'INSERT') {
                    tickets.push(mapTicket(payload.new));
                    document.getElementById('empty-state').classList.add('hidden');
                    document.getElementById('tickets-grid').classList.remove('hidden');
                    renderTickets();
                } else if (payload.eventType === 'DELETE') {
                    tickets = tickets.filter(t => t.id !== payload.old.id);
                    if (tickets.length === 0) {
                        document.getElementById('empty-state').classList.remove('hidden');
                        document.getElementById('tickets-grid').classList.add('hidden');
                    } else renderTickets();
                }
            })
            .subscribe();

        function renderTickets() {
            const container = document.getElementById('tickets-grid');
            container.innerHTML = '';

            tickets.forEach(ticket => {
                const isBullish = ticket.direction === 'bullish';
                const borderColor = isBullish ? 'border-emerald-600/50' : 'border-red-600/50';
                const oddsColor = isBullish ? 'text-emerald-400' : 'text-red-400';
                const btnColor = isBullish ? 'bg-emerald-600 active:bg-emerald-500 hover:bg-emerald-500' : 'bg-red-600 active:bg-red-500 hover:bg-red-500';
                const badge = isBullish
                    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-900/50 text-emerald-400"><i class="fa-solid fa-arrow-trend-up mr-1"></i>看漲</span>'
                    : '<span class="text-xs px-2 py-0.5 rounded-full bg-red-900/50 text-red-400"><i class="fa-solid fa-arrow-trend-down mr-1"></i>看跌</span>';

                const remaining = ticket.maxLimit - ticket.accumulatedBet;
                const percent = Math.min(100, Math.round((ticket.accumulatedBet / ticket.maxLimit) * 100));
                const isFull = remaining <= 0;

                const card = document.createElement('div');
                card.className = `ticket-card bg-slate-900 border ${borderColor} rounded-2xl p-4 md:p-5 active:bg-slate-800/50 flex flex-col`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="pr-3 flex-1 min-w-0">
                            <div class="mb-1.5">${badge}</div>
                            <div class="font-bold text-base md:text-lg leading-snug break-words">${ticket.name}</div>
                            <div class="text-xs text-slate-400 mt-1"><i class="fa-regular fa-clock mr-1"></i>${ticket.expires}</div>
                        </div>
                        <div class="text-right flex-shrink-0 pl-2">
                            <div class="text-2xl md:text-3xl font-bold ${oddsColor}">${ticket.odds}x</div>
                            <div class="text-[10px] text-slate-500">賠率</div>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="w-full bg-slate-800 rounded-full h-1.5 mt-3">
                            <div class="bg-emerald-500 h-1.5 rounded-full" style="width: ${percent}%"></div>
                        </div>
                        <div class="flex justify-between text-[11px] text-slate-500 mt-1">
                            <span>已累積 $${ticket.accumulatedBet.toLocaleString()}</span>
                            <span>剩餘 $${remaining.toLocaleString()}</span>
                        </div>

                        <button class="w-full mt-3 py-3 ${btnColor} rounded-xl text-sm font-bold text-white">
                            ${isFull ? '已額滿' : '立即下注'}
                        </button>
                    </div>
                `;
                card.querySelector('button').onclick = (e) => { e.stopPropagation(); if (!isFull) openBetModal(ticket.id); };
                container.appendChild(card);
            });
        }

        function openBetModal(ticketId) {
            currentTicket = tickets.find(t => t.id === ticketId);
            if (!currentTicket) return;

            const remaining = currentTicket.maxLimit - currentTicket.accumulatedBet;
            document.getElementById('modal-ticket-name').textContent = currentTicket.name;
            document.getElementById('modal-ticket-expires').textContent = currentTicket.expires;
            document.getElementById('modal-ticket-pool').textContent =
                `上限 $${currentTicket.maxLimit.toLocaleString()} · 已累積 $${currentTicket.accumulatedBet.toLocaleString()} · 剩餘 $${remaining.toLocaleString()}`;

            const amountInput = document.getElementById('bet-amount');
            amountInput.value = 1000;
            updatePotentialWin();
            amountInput.oninput = () => { updatePotentialWin(); syncQuickAmountActive(); };

            document.querySelectorAll('.quick-amt').forEach(btn => {
                btn.onclick = () => {
                    amountInput.value = btn.dataset.amt;
                    updatePotentialWin();
                    syncQuickAmountActive();
                };
            });
            syncQuickAmountActive();

            document.getElementById('bet-modal').classList.remove('hidden');
            document.getElementById('bet-modal').classList.add('flex');
        }

        function syncQuickAmountActive() {
            const val = document.getElementById('bet-amount').value;
            document.querySelectorAll('.quick-amt').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.amt === val);
            });
        }

        function setMaxAmount() {
            const remaining = currentTicket.maxLimit - currentTicket.accumulatedBet;
            const maxAmt = Math.min(currentUser.points_balance, remaining);
            document.getElementById('bet-amount').value = maxAmt;
            updatePotentialWin();
            syncQuickAmountActive();
        }

        function updatePotentialWin() {
            const amount = parseInt(document.getElementById('bet-amount').value) || 0;
            const win = Math.floor(amount * currentTicket.odds);
            document.getElementById('potential-win').textContent = win.toLocaleString() + ' 積分';
        }

        function closeBetModal() {
            document.getElementById('bet-modal').classList.add('hidden');
            document.getElementById('bet-modal').classList.remove('flex');
        }

        // ---------- 核心：下注時透過 place_bet RPC 真正扣減 users.points_balance ----------
        async function placeBet() {
            const amount = parseInt(document.getElementById('bet-amount').value);
            if (!amount || amount < 100) { alert('請輸入至少 100 積分'); return; }

            if (amount > currentUser.points_balance) { alert('積分不足！'); return; }

            const remaining = currentTicket.maxLimit - currentTicket.accumulatedBet;
            if (amount > remaining) { alert('超過剩餘空間！'); return; }

            const confirmBtn = document.getElementById('confirm-bet-btn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = '處理中...';

            const potentialWin = Math.floor(amount * currentTicket.odds);

            const { data, error } = await sb.rpc('place_bet', {
                p_ticket_id: currentTicket.id,
                p_user_id: currentUser.user_id,
                p_amount: amount,
                p_direction: currentTicket.direction,
                p_odds: currentTicket.odds,
                p_potential_win: potentialWin
            });

            confirmBtn.disabled = false;
            confirmBtn.textContent = '確認下注';

            if (error || !data.success) {
                alert('下注失敗：' + (data ? data.message : error.message));
                return;
            }

            currentUser.points_balance = data.new_balance;
            saveSession(currentUser);
            refreshUserDisplay();

            currentTicket.currentUnhedged += amount;
            currentTicket.accumulatedBet += amount;

            closeBetModal();
            renderTickets();
            showToast(`下注成功！已扣除 ${amount} 積分`);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-24 md:bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[200] text-sm max-w-[90%]';
            toast.innerHTML = `<i class="fa-solid fa-check-circle"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }

        function init() {
            const session = loadSession();
            if (session) {
                currentUser = session;
                enterGame();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
