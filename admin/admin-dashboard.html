<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台監控中心 • 遊戲網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .stat-card { background: linear-gradient(145deg, #1e2937 0%, #0f172a 100%); }
        .tab-btn.active { background-color: #059669; color: white; }
        .proof-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <div id="admin-auth-screen" class="fixed inset-0 bg-slate-950 z-[300] flex items-center justify-center px-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold">後台管理登入</h1>
                <p class="text-slate-400 text-sm mt-1">此區域僅限授權管理員存取</p>
            </div>

            <div class="space-y-3">
                <input type="text" id="admin-username" placeholder="管理員帳號" autocomplete="username"
                       class="w-full bg-slate-900 border border-slate-700 focus:border-red-500 rounded-2xl px-4 py-3.5 outline-none">
                <input type="password" id="admin-password" placeholder="密碼" autocomplete="current-password"
                       class="w-full bg-slate-900 border border-slate-700 focus:border-red-500 rounded-2xl px-4 py-3.5 outline-none"
                       onkeydown="if(event.key==='Enter') handleAdminLogin()">
            </div>

            <p id="admin-auth-error" class="hidden text-red-400 text-sm mt-3 text-center"></p>

            <button id="admin-login-btn" onclick="handleAdminLogin()" 
                    class="w-full py-3.5 bg-red-600 hover:bg-red-500 rounded-2xl font-bold mt-5">
                登入後台
            </button>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-slate-700 px-4 md:px-6 py-3 flex items-center justify-between sticky top-0 z-50 gap-2">
        <div class="flex items-center gap-x-4 min-w-0">
            <span class="font-bold text-lg whitespace-nowrap flex-shrink-0">後台監控中心</span>
            <a href="../public/player-game.html" 
               class="hidden md:flex text-sm px-3 py-1.5 hover:bg-slate-800 rounded-lg items-center gap-x-2 whitespace-nowrap">
                <i class="fa-solid fa-gamepad"></i>
                <span>回到遊戲頁</span>
            </a>
        </div>
        <div class="flex items-center gap-x-3 flex-shrink-0">
            <span class="text-xs md:text-sm text-slate-400 whitespace-nowrap" id="admin-username-display"></span>
            <div class="px-3 py-1.5 bg-emerald-900/30 border border-emerald-700 rounded-full text-xs md:text-sm flex items-center gap-x-2 whitespace-nowrap">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                <span class="text-emerald-400 hidden sm:inline">系統運作中</span>
            </div>
            <button onclick="handleAdminLogout()" class="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-full">
                <i class="fa-solid fa-right-from-bracket text-sm"></i>
            </button>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-4 md:px-6 py-4 md:py-6">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
            <div class="stat-card rounded-2xl p-4 md:p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">House Account 餘額</div>
                <div class="text-2xl md:text-3xl font-bold mt-1 text-emerald-400" id="house-balance">$0</div>
                <div class="text-xs text-slate-400 mt-1">公司資金池</div>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">累計存款 / 派彩</div>
                <div class="text-xl md:text-2xl font-bold mt-1" id="house-deposits-payouts">$0 / $0</div>
                <div class="text-xs text-slate-400 mt-1">歷史總額</div>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">目前未對沖總額</div>
                <div class="text-2xl md:text-3xl font-bold mt-1 text-yellow-400" id="total-unhedged">$0</div>
                <div class="text-xs text-slate-400 mt-1" id="unhedged-bet-count">0 張未對沖注單</div>
            </div>
            <div class="stat-card rounded-2xl p-4 md:p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">待處理事項</div>
                <div class="text-2xl md:text-3xl font-bold mt-1 text-red-400" id="pending-total">0</div>
                <div class="text-xs text-red-300/70 mt-1">存款 + 對沖 + 結算</div>
            </div>
        </div>

        <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
            <button onclick="switchTab('hedge')" data-tab="hedge" class="tab-btn active px-4 py-2.5 bg-slate-800 rounded-xl text-sm font-medium whitespace-nowrap flex items-center gap-2">
                <i class="fa-solid fa-bolt"></i>對沖管理
                <span class="bg-black/20 px-1.5 rounded-full text-xs" id="tab-count-hedge">0</span>
            </button>
            <button onclick="switchTab('deposits')" data-tab="deposits" class="tab-btn px-4 py-2.5 bg-slate-800 rounded-xl text-sm font-medium whitespace-nowrap flex items-center gap-2">
                <i class="fa-solid fa-wallet"></i>存款審批
                <span class="bg-black/20 px-1.5 rounded-full text-xs" id="tab-count-deposits">0</span>
            </button>
            <button onclick="switchTab('settlement')" data-tab="settlement" class="tab-btn px-4 py-2.5 bg-slate-800 rounded-xl text-sm font-medium whitespace-nowrap flex items-center gap-2">
                <i class="fa-solid fa-flag-checkered"></i>票據結算
                <span class="bg-black/20 px-1.5 rounded-full text-xs" id="tab-count-settlement">0</span>
            </button>
            <button onclick="switchTab('bets')" data-tab="bets" class="tab-btn px-4 py-2.5 bg-slate-800 rounded-xl text-sm font-medium whitespace-nowrap flex items-center gap-2">
                <i class="fa-solid fa-list"></i>所有注單
            </button>
        </div>

        <div id="panel-hedge" class="bg-slate-900 border border-slate-700 rounded-2xl p-4 md:p-6">
            <h3 class="font-bold text-lg mb-4">需要對沖嘅票據</h3>
            <div class="space-y-3" id="urgent-tickets"></div>
        </div>

        <div id="panel-deposits" class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-4 md:p-6">
            <h3 class="font-bold text-lg mb-4">待審批存款請求</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="py-3 px-3 text-left">編號</th>
                            <th class="py-3 px-3 text-left">憑證</th>
                            <th class="py-3 px-3 text-left">玩家</th>
                            <th class="py-3 px-3 text-left">金額</th>
                            <th class="py-3 px-3 text-left">提交時間</th>
                            <th class="py-3 px-3 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="deposits-table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-settlement" class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-4 md:p-6">
            <h3 class="font-bold text-lg mb-4">到期待結算票據</h3>
            <div class="space-y-3" id="settlement-tickets"></div>
        </div>

        <div id="panel-bets" class="hidden bg-slate-900 border border-slate-700 rounded-2xl p-4 md:p-6">
            <h3 class="font-bold text-lg mb-4">所有注單記錄</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="py-3 px-3 text-left">編號</th>
                            <th class="py-3 px-3 text-left">票據</th>
                            <th class="py-3 px-3 text-left">玩家</th>
                            <th class="py-3 px-3 text-left">方向</th>
                            <th class="py-3 px-3 text-left">金額</th>
                            <th class="py-3 px-3 text-left">賠率</th>
                            <th class="py-3 px-3 text-left">結果</th>
                            <th class="py-3 px-3 text-left">派彩</th>
                            <th class="py-3 px-3 text-left">對沖狀態</th>
                        </tr>
                    </thead>
                    <tbody id="all-bets-table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="image-modal" onclick="closeImageModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200] px-4">
        <img id="image-modal-img" class="max-w-full max-h-[85vh] rounded-2xl">
    </div>

    <div id="settle-modal" onclick="if(event.target.id==='settle-modal') closeSettleModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] px-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-md">
            <h3 class="text-lg font-bold mb-1" id="settle-modal-title"></h3>
            <p class="text-sm text-slate-400 mb-5" id="settle-modal-info"></p>

            <label class="block text-sm text-slate-400 mb-2">實際結算價格</label>
            <input type="number" id="settlement-price" class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-2xl px-4 py-3 text-lg outline-none mb-5">

            <div class="grid grid-cols-2 gap-3">
                <button onclick="confirmSettle('lost')" class="py-3.5 bg-red-600 hover:bg-red-500 rounded-2xl font-bold">條件不成立（Lost）</button>
                <button onclick="confirmSettle('won')" class="py-3.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold">條件成立（Won）</button>
            </div>
            <button onclick="closeSettleModal()" class="w-full mt-3 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl">取消</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://hcwikvcdpnnssuibqvbd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd2lrdmNkcG5uc3N1aWJxdmJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDQyMjIsImV4cCI6MjEwMDAyMDIyMn0.apRzZ09BilPfafDEtdOFvbhde2QcxhF5zf0MxZ59du4';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let tickets = [], unhedgedBets = [], allBets = [], deposits = [], houseAccount = null;
        let settleTargetTicketId = null;
        let currentAdmin = null;

        // ---------- Admin 登入邏輯 ----------
        function saveAdminSession(admin) { sessionStorage.setItem('fp_admin_session', JSON.stringify(admin)); currentAdmin = admin; }
        function loadAdminSession() { const raw = sessionStorage.getItem('fp_admin_session'); if (!raw) return null; try { return JSON.parse(raw); } catch { return null; } }
        function clearAdminSession() { sessionStorage.removeItem('fp_admin_session'); currentAdmin = null; }

        function showAdminAuthError(msg) {
            const el = document.getElementById('admin-auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function handleAdminLogin() {
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            if (!username || !password) { showAdminAuthError('請輸入帳號同密碼'); return; }

            const btn = document.getElementById('admin-login-btn');
            btn.disabled = true; btn.textContent = '登入中...';

            const { data, error } = await sb.rpc('login_admin', { p_username: username, p_password: password });

            btn.disabled = false; btn.textContent = '登入後台';

            if (error || !data.success) {
                showAdminAuthError(data ? data.message : '登入失敗，請稍後再試');
                return;
            }

            document.getElementById('admin-auth-error').classList.add('hidden');
            saveAdminSession({ admin_id: data.admin_id, username: data.username, role: data.role, token: data.token, loginTime: Date.now() });
            enterAdminPanel();
        }

        function handleAdminLogout() {
            if (!confirm('確定要登出後台嗎？')) return;
            clearAdminSession();
            document.getElementById('admin-auth-screen').classList.remove('hidden');
            document.getElementById('admin-username').value = '';
            document.getElementById('admin-password').value = '';
        }

        function enterAdminPanel() {
            document.getElementById('admin-auth-screen').classList.add('hidden');
            document.getElementById('admin-username-display').textContent = `${currentAdmin.username} (${currentAdmin.role})`;
            fetchAll();
        }

        // Session 逾時：8 小時後自動登出，降低裝置遺失/長時間閒置嘅風險
        function checkSessionExpiry() {
            if (!currentAdmin) return;
            const elapsed = Date.now() - currentAdmin.loginTime;
            if (elapsed > 8 * 60 * 60 * 1000) {
                alert('登入時間已過期，請重新登入');
                handleAdminLogout();
            }
        }
        setInterval(checkSessionExpiry, 60000);

        function nowHK() { return new Date(); }
        function formatFullTime(d) { return d ? new Date(d).toLocaleString('zh-HK',{timeZone:'Asia/Hong_Kong',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'; }
        function formatTimeAgo(d) {
            if (!d) return '從未';
            const diffMin = Math.floor((nowHK()-new Date(d))/60000);
            if (diffMin<1) return '剛剛';
            if (diffMin<60) return `${diffMin}分鐘前`;
            return `${Math.floor(diffMin/60)}小時${diffMin%60}分前`;
        }

        function switchTab(tab) {
            ['hedge','deposits','settlement','bets'].forEach(t=>{
                document.getElementById('panel-'+t).classList.toggle('hidden', t!==tab);
                document.querySelector(`[data-tab="${t}"]`).classList.toggle('active', t===tab);
            });
        }

        function openImageModal(url) {
            document.getElementById('image-modal-img').src = url;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
        }
        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
        }

        async function fetchAll() {
            if (!currentAdmin) return;
            const [ticketsRes, betsRes, depositsRes, houseRes] = await Promise.all([
                sb.from('tickets').select('*').order('id'),
                sb.from('bets').select('*').order('created_at', {ascending:false}),
                sb.from('deposits').select('*, users(username)').eq('status','pending').order('requested_at'),
                sb.from('house_account').select('*').limit(1).single()
            ]);
            tickets = (ticketsRes.data||[]).map(mapTicket);
            allBets = betsRes.data||[];
            unhedgedBets = allBets.filter(b=>!b.is_hedged && b.result==='pending');
            deposits = depositsRes.data||[];
            houseAccount = houseRes.data;
            updateUI();
        }

        function mapTicket(t) {
            return { id:t.id, name:t.name, direction:t.direction||'bullish', unhedged:Number(t.unhedged)||0,
                lastHedge:t.last_hedge||t.created_at, expiresAt:t.expires_at, maxLimit:Number(t.max_limit)||500000,
                accumulatedBet:Number(t.accumulated_bet)||0, status:t.status||'open' };
        }

        sb.channel('admin-all').on('postgres_changes',{event:'*',schema:'public',table:'tickets'},()=>fetchAll())
          .on('postgres_changes',{event:'*',schema:'public',table:'bets'},()=>fetchAll())
          .on('postgres_changes',{event:'*',schema:'public',table:'deposits'},()=>fetchAll())
          .on('postgres_changes',{event:'*',schema:'public',table:'house_account'},()=>fetchAll())
          .subscribe();

        function updateUI() {
            renderStats();
            renderUrgentTickets();
            renderDeposits();
            renderSettlementTickets();
            renderAllBets();
        }

        function renderStats() {
            if (houseAccount) {
                document.getElementById('house-balance').textContent = '$'+Number(houseAccount.balance).toLocaleString();
                document.getElementById('house-deposits-payouts').textContent =
                    '$'+Number(houseAccount.total_deposits).toLocaleString()+' / $'+Number(houseAccount.total_payouts).toLocaleString();
            }
            const totalUnhedged = tickets.reduce((s,t)=>s+t.unhedged,0);
            document.getElementById('total-unhedged').textContent = '$'+totalUnhedged.toLocaleString();
            document.getElementById('unhedged-bet-count').textContent = `${unhedgedBets.length} 張未對沖注單`;

            const settleCount = tickets.filter(t=>t.status==='closed' || (t.status==='open' && new Date(t.expiresAt)<nowHK())).length;
            document.getElementById('tab-count-hedge').textContent = unhedgedBets.length;
            document.getElementById('tab-count-deposits').textContent = deposits.length;
            document.getElementById('tab-count-settlement').textContent = settleCount;
            document.getElementById('pending-total').textContent = unhedgedBets.length + deposits.length + settleCount;
        }

        function isUrgent(ticket) {
            if (ticket.unhedged<=0) return false;
            const minutes = Math.floor((nowHK()-new Date(ticket.lastHedge))/60000);
            return ticket.unhedged>=1000 || minutes>60;
        }

        function renderUrgentTickets() {
            const container = document.getElementById('urgent-tickets');
            const urgent = tickets.filter(isUrgent);
            if (urgent.length===0) { container.innerHTML = '<p class="text-slate-500 text-sm text-center py-8">目前沒有需要對沖嘅票據</p>'; return; }
            container.innerHTML = '';
            urgent.forEach(ticket=>{
                const betsForTicket = unhedgedBets.filter(b=>b.ticket_id===ticket.id);
                const betRows = betsForTicket.map(b=>`
                    <div class="flex justify-between items-center text-xs py-1.5 px-3 bg-slate-950/60 rounded-lg mt-1">
                        <span class="text-slate-300">${b.player_name}</span>
                        <span class="text-slate-400">${b.direction==='bullish'?'看漲':'看跌'}</span>
                        <span class="font-bold text-yellow-400">$${Number(b.amount).toLocaleString()}</span>
                    </div>`).join('');
                const div = document.createElement('div');
                div.className = 'bg-slate-950/70 border border-red-600 rounded-xl p-4';
                div.innerHTML = `
                    <div class="flex justify-between items-center flex-wrap gap-2">
                        <div>
                            <div class="font-bold">${ticket.name}</div>
                            <div class="text-xs text-slate-400 mt-0.5">未對沖：<span class="text-yellow-400 font-bold">$${ticket.unhedged.toLocaleString()}</span> ｜ ${betsForTicket.length}張注單 ｜ 距上次對沖：${formatTimeAgo(ticket.lastHedge)}</div>
                        </div>
                        <button onclick="performHedge(${ticket.id})" class="px-5 py-2 bg-red-600 hover:bg-red-500 rounded-xl font-bold text-sm">立即對沖（全額）</button>
                    </div>
                    ${betsForTicket.length?`<div class="mt-2 space-y-0.5">${betRows}</div>`:''}
                `;
                container.appendChild(div);
            });
        }

        function renderDeposits() {
            const tbody = document.getElementById('deposits-table-body');
            if (deposits.length===0) { tbody.innerHTML='<tr><td colspan="6" class="py-6 text-center text-slate-500">沒有待審批存款</td></tr>'; return; }
            tbody.innerHTML = deposits.map(d=>{
                const isImage = d.payment_reference && /^https?:\/\//.test(d.payment_reference);
                const proofCell = isImage
                    ? `<img src="${d.payment_reference}" class="proof-thumb" onclick="openImageModal('${d.payment_reference}')">`
                    : (d.payment_reference || '—');
                return `
                <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                    <td class="py-3 px-3 text-slate-400">#${d.id}</td>
                    <td class="py-3 px-3">${proofCell}</td>
                    <td class="py-3 px-3 font-medium">${d.users?.username||'—'}</td>
                    <td class="py-3 px-3 font-bold text-emerald-400">$${Number(d.amount).toLocaleString()}</td>
                    <td class="py-3 px-3 text-slate-400">${formatFullTime(d.requested_at)}</td>
                    <td class="py-3 px-3 text-right space-x-2 whitespace-nowrap">
                        <button onclick="rejectDeposit(${d.id})" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs">拒絕</button>
                        <button onclick="approveDeposit(${d.id})" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-xs font-bold">批准</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderSettlementTickets() {
            const container = document.getElementById('settlement-tickets');
            const due = tickets.filter(t=>(t.status==='closed'||t.status==='open') && new Date(t.expiresAt)<nowHK());
            if (due.length===0) { container.innerHTML='<p class="text-slate-500 text-sm text-center py-8">目前沒有到期待結算票據</p>'; return; }
            container.innerHTML = due.map(t=>{
                const betCount = allBets.filter(b=>b.ticket_id===t.id && b.result==='pending').length;
                return `
                <div class="bg-slate-950/70 border border-orange-600 rounded-xl p-4 flex justify-between items-center flex-wrap gap-2">
                    <div>
                        <div class="font-bold">${t.name}</div>
                        <div class="text-xs text-slate-400 mt-0.5">已到期：${formatFullTime(t.expiresAt)} ｜ ${betCount}張未結算注單 ｜ 方向：${t.direction==='bullish'?'看漲':'看跌'}</div>
                    </div>
                    <button onclick="openSettleModal(${t.id}, '${t.name.replace(/'/g,"\\'")}')" class="px-5 py-2 bg-orange-600 hover:bg-orange-500 rounded-xl font-bold text-sm">結算</button>
                </div>`;
            }).join('');
        }

        function renderAllBets() {
            const tbody = document.getElementById('all-bets-table-body');
            if (allBets.length===0) { tbody.innerHTML='<tr><td colspan="9" class="py-6 text-center text-slate-500">沒有注單記錄</td></tr>'; return; }
            tbody.innerHTML = allBets.slice(0,100).map(b=>{
                const ticket = tickets.find(t=>t.id===b.ticket_id);
                const resultBadge = b.result==='won' ? '<span class="text-emerald-400">贏</span>' : b.result==='lost' ? '<span class="text-red-400">輸</span>' : '<span class="text-slate-500">待定</span>';
                return `
                <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                    <td class="py-2.5 px-3 text-slate-400">#${b.id}</td>
                    <td class="py-2.5 px-3">${ticket?ticket.name:'#'+b.ticket_id}</td>
                    <td class="py-2.5 px-3 font-medium">${b.player_name}</td>
                    <td class="py-2.5 px-3">${b.direction==='bullish'?'看漲':'看跌'}</td>
                    <td class="py-2.5 px-3 text-yellow-400">$${Number(b.amount).toLocaleString()}</td>
                    <td class="py-2.5 px-3">${b.odds}x</td>
                    <td class="py-2.5 px-3">${resultBadge}</td>
                    <td class="py-2.5 px-3 text-emerald-400">${b.payout>0?'$'+Number(b.payout).toLocaleString():'—'}</td>
                    <td class="py-2.5 px-3">${b.is_hedged?'<span class="text-emerald-400">已對沖</span>':'<span class="text-yellow-400">未對沖</span>'}</td>
                </tr>`;
            }).join('');
        }

        async function performHedge(ticketId) {
            const { error } = await sb.rpc('hedge_ticket', { p_ticket_id: ticketId });
            if (error) { alert('對沖失敗：'+error.message); return; }
            fetchAll();
        }

        async function approveDeposit(depositId) {
            if (!confirm('確認已收到真實款項，批准此存款？')) return;
            const { data, error } = await sb.rpc('approve_deposit', { p_deposit_id: depositId, p_admin_name: currentAdmin.username });
            if (error || !data.success) { alert('批准失敗：'+(data?data.message:error.message)); return; }
            fetchAll();
        }

        async function rejectDeposit(depositId) {
            if (!confirm('確認拒絕此存款請求？')) return;
            const { error } = await sb.rpc('reject_deposit', { p_deposit_id: depositId, p_admin_name: currentAdmin.username });
            if (error) { alert('操作失敗：'+error.message); return; }
            fetchAll();
        }

        function openSettleModal(ticketId, ticketName) {
            settleTargetTicketId = ticketId;
            document.getElementById('settle-modal-title').textContent = ticketName;
            document.getElementById('settle-modal-info').textContent = '請輸入實際結算價格，並判斷條件是否成立';
            document.getElementById('settlement-price').value = '';
            document.getElementById('settle-modal').classList.remove('hidden');
            document.getElementById('settle-modal').classList.add('flex');
        }

        function closeSettleModal() {
            document.getElementById('settle-modal').classList.add('hidden');
            document.getElementById('settle-modal').classList.remove('flex');
        }

        async function confirmSettle(outcome) {
            const price = parseFloat(document.getElementById('settlement-price').value);
            if (isNaN(price)) { alert('請輸入結算價格'); return; }
            if (!confirm(`確認結算為「${outcome==='won'?'條件成立':'條件不成立'}」？此操作不可逆。`)) return;

            const { data, error } = await sb.rpc('settle_ticket', {
                p_ticket_id: settleTargetTicketId, p_outcome: outcome, p_settlement_price: price
            });
            if (error || !data.success) { alert('結算失敗：'+(data?data.message:error.message)); return; }
            alert(`結算完成！共處理 ${data.bets_settled} 張注單，總派彩 $${Number(data.total_payout).toLocaleString()}`);
            closeSettleModal();
            fetchAll();
        }

        function init() {
            const session = loadAdminSession();
            if (session) {
                currentAdmin = session;
                enterAdminPanel();
            } else {
                document.getElementById('admin-auth-screen').classList.remove('hidden');
            }
        }

        setInterval(() => { if (currentAdmin) fetchAll(); }, 30000);
        window.onload = init;
    </script>
</body>
</html>
