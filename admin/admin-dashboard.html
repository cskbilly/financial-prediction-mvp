<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台監控中心 • 遊戲網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .stat-card { background: linear-gradient(145deg, #1e2937 0%, #0f172a 100%); }
        .alert-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <nav class="bg-slate-900 border-b border-slate-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-6">
            <a href="#" class="font-bold text-xl">後台監控中心</a>
            <a href="../public/player-game.html" 
               class="text-sm px-3 py-1.5 hover:bg-slate-800 rounded-lg flex items-center gap-x-2 transition-colors">
                <i class="fa-solid fa-gamepad"></i>
                <span>回到遊戲頁</span>
            </a>
        </div>
        <div class="flex items-center gap-x-4">
            <div class="px-3 py-1.5 bg-emerald-900/30 border border-emerald-700 rounded-full text-sm flex items-center gap-x-2">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                <span class="text-emerald-400">系統運作中</span>
            </div>
            <div class="text-right text-sm">
                <div>對沖管理員</div>
                <div class="text-xs text-slate-400" id="last-update">載入中...</div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-6">
        
        <div class="mb-6 bg-gradient-to-r from-red-900/40 to-orange-900/30 border border-red-600 rounded-2xl p-5">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center alert-pulse">
                        <i class="fa-solid fa-bolt text-white text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-red-200">需要立即對沖</h2>
                        <div class="text-xs text-red-200/70">觸發條件：① 未對沖金額 ≥ $1,000　或　② 未對沖金額 > $0 且超過 1 小時未對沖</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-bold text-red-300" id="urgent-count">0</div>
                    <div class="text-xs text-red-200/70">張票據需處理</div>
                </div>
            </div>

            <div class="space-y-3" id="urgent-tickets">
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="stat-card rounded-2xl p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">目前票據總數</div>
                <div class="text-3xl font-bold mt-1" id="total-tickets">0</div>
                <div class="text-xs text-slate-400 mt-1">來自 Supabase</div>
            </div>
            <div class="stat-card rounded-2xl p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">所有票據總上限</div>
                <div class="text-3xl font-bold mt-1" id="total-limit">$0</div>
                <div class="text-xs text-slate-400 mt-1" id="expiring-soon">0 張即將到期</div>
            </div>
            <div class="stat-card rounded-2xl p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">目前未對沖總額</div>
                <div class="text-3xl font-bold mt-1 text-yellow-400" id="total-unhedged">$0</div>
                <div class="text-xs text-slate-400 mt-1" id="unhedged-bet-count">0 張未對沖注單</div>
            </div>
            <div class="stat-card rounded-2xl p-5 border border-slate-700">
                <div class="text-slate-400 text-xs">待對沖票據</div>
                <div class="text-3xl font-bold mt-1 text-red-400" id="pending-count">0</div>
                <div class="text-xs text-red-300/70 mt-1">需優先處理</div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-lg">所有票據即時狀態</h3>
                <button id="refresh-btn" onclick="loadAll()" 
                        class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm flex items-center gap-2">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>刷新數據</span>
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="py-3 px-4 text-left">票據名稱</th>
                            <th class="py-3 px-4 text-left">方向</th>
                            <th class="py-3 px-4 text-left">上限 / 已累積 / 剩餘</th>
                            <th class="py-3 px-4 text-left">未對沖金額</th>
                            <th class="py-3 px-4 text-left">距上次對沖</th>
                            <th class="py-3 px-4 text-left">狀態</th>
                            <th class="py-3 px-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-table-body" class="divide-y divide-slate-800">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 mt-6">
            <h3 class="font-bold text-lg mb-4">所有未對沖注單明細</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="py-3 px-4 text-left">注單編號</th>
                            <th class="py-3 px-4 text-left">所屬票據</th>
                            <th class="py-3 px-4 text-left">玩家</th>
                            <th class="py-3 px-4 text-left">方向</th>
                            <th class="py-3 px-4 text-left">金額</th>
                            <th class="py-3 px-4 text-left">賠率</th>
                            <th class="py-3 px-4 text-left">預計贏額</th>
                            <th class="py-3 px-4 text-left">下注時間</th>
                        </tr>
                    </thead>
                    <tbody id="bets-table-body" class="divide-y divide-slate-800">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://hcwikvcdpnnssuibqvbd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd2lrdmNkcG5uc3N1aWJxdmJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDQyMjIsImV4cCI6MjEwMDAyMDIyMn0.apRzZ09BilPfafDEtdOFvbhde2QcxhF5zf0MxZ59du4';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let tickets = [];
        let unhedgedBets = [];
        let isRefreshing = false;

        function nowHK() { return new Date(); }

        function formatFullTime(date) {
            if (!date) return '—';
            return new Date(date).toLocaleString('zh-HK', {
                timeZone: 'Asia/Hong_Kong',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function formatTimeAgo(date) {
            if (!date) return '從未對沖';
            const diffMs = nowHK() - new Date(date);
            const diffMin = Math.floor(diffMs / 1000 / 60);
            if (diffMin < 1) return '剛剛';
            if (diffMin < 60) return `${diffMin} 分鐘前`;
            const hours = Math.floor(diffMin / 60);
            const mins = diffMin % 60;
            return `${hours} 小時 ${mins} 分前`;
        }

        async function fetchTickets() {
            const { data, error } = await sb.from('tickets').select('*').order('id', { ascending: true });
            if (error) { console.error('讀取 tickets 失敗:', error); return []; }
            return data.map(mapTicket);
        }

        async function fetchUnhedgedBets() {
            const { data, error } = await sb
                .from('bets')
                .select('*')
                .eq('is_hedged', false)
                .order('created_at', { ascending: false });
            if (error) { console.error('讀取 bets 失敗:', error); return []; }
            return data;
        }

        function mapTicket(t) {
            return {
                id: t.id,
                name: t.name,
                direction: t.direction || 'bullish',
                unhedged: Number(t.unhedged) || 0,
                lastHedge: t.last_hedge || t.created_at,
                expiresAt: t.expires_at,
                maxLimit: Number(t.max_limit) || 500000,
                accumulatedBet: Number(t.accumulated_bet) || 0,
                odds: t.odds,
                currentPrice: t.current_price
            };
        }

        async function loadAll() {
            if (isRefreshing) return;
            isRefreshing = true;
            setRefreshButtonState(true);
            try {
                const [ticketData, betData] = await Promise.all([
                    fetchTickets(),
                    fetchUnhedgedBets()
                ]);
                tickets = ticketData;
                unhedgedBets = betData;
                updateUI();
                setLastUpdateNow();
            } finally {
                isRefreshing = false;
                setRefreshButtonState(false);
            }
        }

        function setRefreshButtonState(loading) {
            const btn = document.getElementById('refresh-btn');
            if (!btn) return;
            btn.disabled = loading;
            btn.innerHTML = loading
                ? `<i class="fa-solid fa-spinner fa-spin"></i><span>刷新中...</span>`
                : `<i class="fa-solid fa-sync-alt"></i><span>刷新數據</span>`;
        }

        function setLastUpdateNow() {
            document.getElementById('last-update').textContent = '最後刷新：' + formatFullTime(nowHK());
        }

        sb.channel('admin-tickets-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, (payload) => {
                if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
                    const updated = mapTicket(payload.new);
                    const index = tickets.findIndex(t => t.id === updated.id);
                    if (index !== -1) tickets[index] = updated;
                    else tickets.push(updated);
                } else if (payload.eventType === 'DELETE') {
                    tickets = tickets.filter(t => t.id !== payload.old.id);
                }
                updateUI();
                setLastUpdateNow();
            })
            .subscribe();

        sb.channel('admin-bets-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'bets' }, async () => {
                unhedgedBets = await fetchUnhedgedBets();
                updateUI();
                setLastUpdateNow();
            })
            .subscribe();

        function updateUI() {
            renderUrgentTickets();
            renderTicketsTable();
            renderBetsTable();
            updateOverviewStats();
        }

        function updateOverviewStats() {
            const totalUnhedged = tickets.reduce((sum, t) => sum + t.unhedged, 0);
            const totalLimit = tickets.reduce((sum, t) => sum + t.maxLimit, 0);
            const pendingCount = tickets.filter(isUrgent).length;
            const expiringSoon = tickets.filter(t => {
                if (!t.expiresAt) return false;
                const hoursLeft = (new Date(t.expiresAt) - nowHK()) / 1000 / 60 / 60;
                return hoursLeft > 0 && hoursLeft < 2;
            }).length;

            document.getElementById('total-tickets').textContent = tickets.length;
            document.getElementById('total-limit').textContent = '$' + totalLimit.toLocaleString();
            document.getElementById('expiring-soon').textContent = `${expiringSoon} 張即將到期`;
            document.getElementById('total-unhedged').textContent = '$' + totalUnhedged.toLocaleString();
            document.getElementById('unhedged-bet-count').textContent = `${unhedgedBets.length} 張未對沖注單`;
            document.getElementById('pending-count').textContent = pendingCount;
        }

        function isUrgent(ticket) {
            if (ticket.unhedged <= 0) return false;
            const minutes = Math.floor((nowHK() - new Date(ticket.lastHedge)) / 1000 / 60);
            return ticket.unhedged >= 1000 || minutes > 60;
        }

        function getStatus(ticket) {
            if (ticket.unhedged <= 0) return { color: 'emerald', label: '正常' };
            if (ticket.unhedged >= 1000) return { color: 'red', label: '需立即對沖' };
            const minutes = Math.floor((nowHK() - new Date(ticket.lastHedge)) / 1000 / 60);
            if (minutes > 60) return { color: 'orange', label: '需立即對沖' };
            return { color: 'emerald', label: '正常' };
        }

        function renderUrgentTickets() {
            const container = document.getElementById('urgent-tickets');
            container.innerHTML = '';
            const urgent = tickets.filter(isUrgent);
            document.getElementById('urgent-count').textContent = urgent.length;

            urgent.forEach(ticket => {
                const status = getStatus(ticket);
                const betsForTicket = unhedgedBets.filter(b => b.ticket_id === ticket.id);
                const accumulatedFromBets = betsForTicket.reduce((s, b) => s + Number(b.amount || 0), 0);

                const betRows = betsForTicket.map(b => `
                    <div class="flex justify-between items-center text-xs py-1.5 px-3 bg-slate-900/60 rounded-lg mt-1">
                        <span class="text-slate-300">${b.player_name}</span>
                        <span class="text-slate-400">${b.direction === 'bullish' ? '看漲' : '看跌'}</span>
                        <span class="font-bold text-yellow-400">$${Number(b.amount).toLocaleString()}</span>
                        <span class="text-slate-500">${formatFullTime(b.created_at)}</span>
                    </div>
                `).join('');

                const div = document.createElement('div');
                div.className = `bg-slate-950/70 border border-${status.color}-500 rounded-xl p-4`;
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-bold">${ticket.name}</div>
                            <div class="text-xs text-slate-400 mt-0.5" title="${formatFullTime(ticket.lastHedge)}">
                                累積未對沖：<span class="text-yellow-400 font-bold">$${ticket.unhedged.toLocaleString()}</span>
                                （${betsForTicket.length} 張注單，明細合計 $${accumulatedFromBets.toLocaleString()}）
                                ｜ 距上次對沖：${formatTimeAgo(ticket.lastHedge)}
                            </div>
                        </div>
                        <button onclick="performHedge(${ticket.id}, this)"
                                class="px-5 py-2 bg-${status.color}-600 hover:bg-${status.color}-500 rounded-xl font-bold text-sm shrink-0">
                            立即對沖（全額）
                        </button>
                    </div>
                    ${betsForTicket.length ? `<div class="mt-2 space-y-0.5">${betRows}</div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        function renderTicketsTable() {
            const tbody = document.getElementById('tickets-table-body');
            tbody.innerHTML = '';

            tickets.forEach(ticket => {
                const status = getStatus(ticket);
                const directionBadge = ticket.direction === 'bullish'
                    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-900/50 text-emerald-400">看漲</span>'
                    : '<span class="text-xs px-2 py-0.5 rounded-full bg-red-900/50 text-red-400">看跌</span>';

                const remaining = ticket.maxLimit - ticket.accumulatedBet;

                const row = document.createElement('tr');
                row.className = 'border-b border-slate-800 hover:bg-slate-900';
                row.innerHTML = `
                    <td class="py-4 px-4 font-medium">${ticket.name}</td>
                    <td class="py-4 px-4">${directionBadge}</td>
                    <td class="py-4 px-4 text-xs text-slate-400">
                        $${ticket.maxLimit.toLocaleString()} / $${ticket.accumulatedBet.toLocaleString()} / $${remaining.toLocaleString()}
                    </td>
                    <td class="py-4 px-4 font-bold">$${ticket.unhedged.toLocaleString()}</td>
                    <td class="py-4 px-4 text-slate-400" title="${formatFullTime(ticket.lastHedge)}">${formatTimeAgo(ticket.lastHedge)}</td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 text-xs rounded-full bg-${status.color}-900/50 text-${status.color}-400">
                            ${status.label}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-right">
                        <button onclick="performHedge(${ticket.id}, this)"
                                class="px-4 py-2 text-sm rounded-xl ${status.color === 'emerald' ? 'bg-slate-700 hover:bg-slate-600' : `bg-${status.color}-600 hover:bg-${status.color}-500`}">
                            ${status.color === 'emerald' ? '查看' : '立即對沖'}
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderBetsTable() {
            const tbody = document.getElementById('bets-table-body');
            tbody.innerHTML = '';

            if (unhedgedBets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="py-6 text-center text-slate-500">目前沒有未對沖注單</td></tr>`;
                return;
            }

            unhedgedBets.forEach(bet => {
                const ticket = tickets.find(t => t.id === bet.ticket_id);
                const directionBadge = bet.direction === 'bullish'
                    ? '<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-900/50 text-emerald-400">看漲</span>'
                    : '<span class="text-xs px-2 py-0.5 rounded-full bg-red-900/50 text-red-400">看跌</span>';

                const row = document.createElement('tr');
                row.className = 'border-b border-slate-800 hover:bg-slate-900';
                row.innerHTML = `
                    <td class="py-3 px-4 text-slate-400">#${bet.id}</td>
                    <td class="py-3 px-4">${ticket ? ticket.name : '票據 #' + bet.ticket_id}</td>
                    <td class="py-3 px-4 font-medium">${bet.player_name}</td>
                    <td class="py-3 px-4">${directionBadge}</td>
                    <td class="py-3 px-4 font-bold text-yellow-400">$${Number(bet.amount).toLocaleString()}</td>
                    <td class="py-3 px-4">${bet.odds}x</td>
                    <td class="py-3 px-4 text-emerald-400">$${Number(bet.potential_win).toLocaleString()}</td>
                    <td class="py-3 px-4 text-slate-400" title="${formatFullTime(bet.created_at)}">${formatTimeAgo(bet.created_at)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        async function performHedge(ticketId, buttonElement) {
            const ticket = tickets.find(t => t.id === ticketId);
            if (!ticket) return;

            buttonElement.disabled = true;
            buttonElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>執行中...`;

            const { error } = await sb.rpc('hedge_ticket', { p_ticket_id: ticketId });

            if (error) {
                console.error('對沖失敗:', error);
                buttonElement.disabled = false;
                buttonElement.innerHTML = '重試';
                return;
            }

            ticket.unhedged = 0;
            ticket.lastHedge = new Date().toISOString();
            unhedgedBets = unhedgedBets.filter(b => b.ticket_id !== ticketId);

            updateUI();
            setLastUpdateNow();
        }

        setInterval(() => {
            renderUrgentTickets();
            renderTicketsTable();
            renderBetsTable();
        }, 30000);

        function init() {
            loadAll();
        }

        window.onload = init;
    </script>
</body>
</html>
